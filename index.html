<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasinda C. Prabhashana | PhD Researcher</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3058;
    --teal: #00b4d8;
    --teal-light: #48cae4;
    --gold: #f4a732;
    --gold-light: #ffd166;
    --text-main: #e8eaf0;
    --text-muted: #8b9ab5;
    --text-soft: #c5cedd;
    --border: rgba(0,180,216,0.15);
    --card: rgba(17,34,64,0.7);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--text-main); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,180,216,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(244,167,50,0.05) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%2300b4d8' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* NAV */
  nav { position:sticky; top:0; z-index:100; background:rgba(10,22,40,0.93); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 2rem; }
  .nav-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; overflow-x:auto; scrollbar-width:none; }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--teal); padding:1rem 1.5rem 1rem 0; white-space:nowrap; border-right:1px solid var(--border); margin-right:1rem; flex-shrink:0; }
  .nav-tabs { display:flex; list-style:none; }
  .nav-tab { padding:1rem 1.1rem; cursor:pointer; font-size:0.82rem; font-weight:500; letter-spacing:0.05em; text-transform:uppercase; color:var(--text-muted); border-bottom:2px solid transparent; transition:all 0.25s; white-space:nowrap; flex-shrink:0; }
  .nav-tab:hover { color:var(--teal-light); }
  .nav-tab.active { color:var(--teal); border-bottom-color:var(--teal); background:rgba(0,180,216,0.05); }

  /* PAGES */
  .page { display:none; position:relative; z-index:1; }
  .page.active { display:block; animation:fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .container { max-width:1200px; margin:0 auto; padding:3rem 2rem; }

  /* ABOUT */
  .about-hero { display:grid; grid-template-columns:280px 1fr; gap:3rem; margin-bottom:3.5rem; align-items:start; }
  .photo-col { display:flex; flex-direction:column; align-items:center; gap:1.2rem; }
  .photo-frame { position:relative; width:220px; height:220px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--gold)); padding:3px; flex-shrink:0; }
  .photo-inner { width:100%; height:100%; border-radius:50%; background:var(--navy-mid); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .photo-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .photo-placeholder { font-size:5rem; opacity:0.3; }

  .contact-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1.4rem; width:100%; backdrop-filter:blur(10px); }
  .contact-card h4 { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--teal); margin-bottom:0.9rem; font-weight:600; }
  .contact-item { display:flex; align-items:flex-start; gap:0.6rem; margin-bottom:0.7rem; font-size:0.8rem; color:var(--text-soft); }
  .contact-item:last-child { margin-bottom:0; }
  .contact-icon { width:16px; text-align:center; color:var(--teal); flex-shrink:0; margin-top:1px; }
  .contact-item a { color:var(--teal-light); text-decoration:none; }
  .contact-item a:hover { color:var(--gold); }

  .social-links { width:100%; }
  .social-links h4 { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--teal); margin-bottom:0.75rem; font-weight:600; }
  .social-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.45rem; }
  .social-btn { display:flex; align-items:center; gap:0.45rem; padding:0.45rem 0.7rem; border-radius:7px; background:rgba(0,180,216,0.07); border:1px solid var(--border); color:var(--text-soft); text-decoration:none; font-size:0.75rem; font-weight:500; transition:all 0.2s; }
  .social-btn:hover { background:rgba(0,180,216,0.15); border-color:var(--teal); color:var(--teal-light); }
  .social-btn svg { flex-shrink:0; }

  .lab-badge { background:linear-gradient(135deg,rgba(0,180,216,0.15),rgba(244,167,50,0.08)); border:1px solid rgba(0,180,216,0.3); border-radius:8px; padding:0.8rem 1rem; text-align:center; width:100%; }
  .lab-badge .lab-name { font-size:0.78rem; font-weight:600; color:var(--gold); line-height:1.4; }
  .lab-badge .lab-sub { font-size:0.7rem; color:var(--text-muted); margin-top:0.2rem; }

  .intro-greeting { font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--teal); letter-spacing:0.05em; margin-bottom:0.5rem; opacity:0.8; }
  .intro-name { font-family:'Playfair Display',serif; font-size:3rem; font-weight:700; line-height:1.1; margin-bottom:0.5rem; background:linear-gradient(135deg,#fff 30%,var(--teal-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .intro-title { font-size:1rem; color:var(--gold); font-weight:500; margin-bottom:1.5rem; display:flex; align-items:center; gap:0.5rem; }
  .intro-title::before { content:''; width:30px; height:2px; background:var(--gold); }
  .intro-bio { font-size:1rem; line-height:1.8; color:var(--text-soft); margin-bottom:1.2rem; }
  .intro-bio strong { color:var(--text-main); font-weight:600; }
  .research-tags { display:flex; flex-wrap:wrap; gap:0.6rem; margin-bottom:1.5rem; }
  .tag { background:rgba(0,180,216,0.1); border:1px solid rgba(0,180,216,0.25); color:var(--teal-light); padding:0.35rem 0.85rem; border-radius:100px; font-size:0.78rem; font-weight:500; transition:all 0.2s; }
  .tag:hover { background:rgba(0,180,216,0.2); border-color:var(--teal); }
  .stat-row { display:flex; gap:2rem; flex-wrap:wrap; }
  .stat-item { text-align:center; }
  .stat-num { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--teal); line-height:1; }
  .stat-label { font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:0.25rem; }

  /* SECTION TITLE */
  .section-title { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:600; color:var(--text-main); margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem; }
  .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

  /* EDUCATION */
  .edu-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.2rem; margin-bottom:3rem; }
  .edu-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; backdrop-filter:blur(10px); position:relative; overflow:hidden; transition:border-color 0.3s,transform 0.3s; }
  .edu-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:linear-gradient(180deg,var(--teal),var(--gold)); }
  .edu-card:hover { border-color:rgba(0,180,216,0.35); transform:translateY(-2px); }
  .edu-degree { font-weight:600; font-size:0.95rem; margin-bottom:0.3rem; }
  .edu-school { color:var(--teal); font-size:0.85rem; margin-bottom:0.25rem; font-weight:500; }
  .edu-period { font-size:0.75rem; color:var(--text-muted); font-family:'DM Mono',monospace; margin-bottom:0.75rem; }
  .edu-detail { font-size:0.8rem; color:var(--text-soft); line-height:1.5; }
  .badge-gold { display:inline-block; background:rgba(244,167,50,0.15); border:1px solid rgba(244,167,50,0.3); color:var(--gold); padding:0.15rem 0.5rem; border-radius:4px; font-size:0.72rem; font-weight:600; margin-top:0.4rem; }

  /* NEWS */
  .news-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; }
  .news-item { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1.4rem; display:flex; gap:1rem; align-items:flex-start; transition:border-color 0.3s; }
  .news-item:hover { border-color:rgba(0,180,216,0.35); }
  .news-dot { width:10px; height:10px; border-radius:50%; background:var(--teal); margin-top:5px; flex-shrink:0; box-shadow:0 0 8px var(--teal); }
  .news-dot.gold { background:var(--gold); box-shadow:0 0 8px var(--gold); }
  .news-date { font-size:0.72rem; color:var(--text-muted); font-family:'DM Mono',monospace; margin-bottom:0.25rem; }
  .news-text { font-size:0.85rem; color:var(--text-soft); line-height:1.5; }

  /* TIMELINE */
  .timeline { position:relative; padding-left:2rem; }
  .timeline::before { content:''; position:absolute; left:0; top:8px; bottom:0; width:2px; background:linear-gradient(180deg,var(--teal),var(--gold),rgba(0,180,216,0.1)); }
  .timeline-item { position:relative; margin-bottom:2.5rem; }
  .timeline-dot { position:absolute; left:-2.4rem; top:6px; width:12px; height:12px; border-radius:50%; background:var(--teal); border:2px solid var(--navy); box-shadow:0 0 10px rgba(0,180,216,0.5); }
  .timeline-dot.gold { background:var(--gold); box-shadow:0 0 10px rgba(244,167,50,0.5); }
  .timeline-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem 1.8rem; backdrop-filter:blur(10px); transition:border-color 0.3s,transform 0.3s; }
  .timeline-card:hover { border-color:rgba(0,180,216,0.35); transform:translateX(4px); }
  .timeline-header { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:0.5rem; flex-wrap:wrap; }
  .timeline-role { font-weight:600; font-size:1rem; }
  .timeline-period { font-family:'DM Mono',monospace; font-size:0.75rem; color:var(--teal); white-space:nowrap; background:rgba(0,180,216,0.1); padding:0.2rem 0.6rem; border-radius:4px; }
  .timeline-org { font-size:0.85rem; color:var(--gold); margin-bottom:0.8rem; font-weight:500; }
  .timeline-body { font-size:0.85rem; color:var(--text-soft); line-height:1.7; }
  .timeline-body ul { list-style:none; padding:0; }
  .timeline-body li { padding-left:1rem; position:relative; margin-bottom:0.35rem; }
  .timeline-body li::before { content:'›'; position:absolute; left:0; color:var(--teal); }

  /* PUBLICATIONS */
  .pub-filter { display:flex; gap:0.5rem; margin-bottom:2rem; flex-wrap:wrap; }
  .filter-btn { padding:0.4rem 1rem; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:0.8rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .filter-btn.active,.filter-btn:hover { background:rgba(0,180,216,0.15); border-color:var(--teal); color:var(--teal); }
  .pub-list { display:flex; flex-direction:column; gap:1rem; }
  .pub-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.4rem 1.6rem; backdrop-filter:blur(10px); transition:border-color 0.3s; position:relative; }
  .pub-card:hover { border-color:rgba(0,180,216,0.35); }
  .pub-number { position:absolute; top:1.4rem; right:1.6rem; font-family:'Playfair Display',serif; font-size:2rem; color:rgba(0,180,216,0.07); font-weight:700; line-height:1; }
  .pub-type { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; font-weight:600; margin-bottom:0.5rem; }
  .pub-type.journal { color:var(--teal); }
  .pub-type.conference { color:var(--gold); }
  .pub-type.patent { color:#a78bfa; }
  .pub-title { font-weight:600; font-size:0.92rem; line-height:1.5; margin-bottom:0.5rem; color:var(--text-main); }
  .pub-authors { font-size:0.8rem; color:var(--text-muted); margin-bottom:0.4rem; line-height:1.5; }
  .pub-venue { font-size:0.8rem; color:var(--text-soft); font-style:italic; }
  .pub-status { display:inline-block; margin-left:0.5rem; font-size:0.68rem; padding:0.1rem 0.4rem; border-radius:3px; font-style:normal; font-weight:600; }
  .status-submitted { background:rgba(139,154,181,0.15); color:var(--text-muted); }
  .status-accepted { background:rgba(72,202,228,0.15); color:var(--teal-light); }
  .status-best { background:rgba(244,167,50,0.15); color:var(--gold); }

  /* AWARDS */
  .awards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1.2rem; }
  .award-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; backdrop-filter:blur(10px); transition:all 0.3s; position:relative; overflow:hidden; }
  .award-card::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(244,167,50,0.04) 0%,transparent 60%); pointer-events:none; }
  .award-card:hover { border-color:rgba(244,167,50,0.35); transform:translateY(-3px); }
  .award-icon { font-size:1.8rem; margin-bottom:0.8rem; }
  .award-year { position:absolute; top:1rem; right:1rem; font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--gold); background:rgba(244,167,50,0.1); padding:0.15rem 0.5rem; border-radius:4px; }
  .award-title { font-weight:600; font-size:0.92rem; margin-bottom:0.4rem; line-height:1.4; color:var(--text-main); }
  .award-org { font-size:0.8rem; color:var(--gold); margin-bottom:0.5rem; font-weight:500; }
  .award-desc { font-size:0.78rem; color:var(--text-muted); line-height:1.5; }

  /* PROFESSIONAL */
  .pro-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:2rem; }
  .pro-section-title { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--teal); font-weight:600; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border); }
  .pro-item { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:0.9rem 1.1rem; margin-bottom:0.6rem; display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; transition:border-color 0.2s; }
  .pro-item:hover { border-color:rgba(0,180,216,0.3); }
  .pro-item-name { font-size:0.83rem; color:var(--text-soft); line-height:1.4; flex:1; }
  .pro-item-year { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--text-muted); white-space:nowrap; }
  .talk-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1.4rem; margin-bottom:0.8rem; display:flex; gap:1rem; transition:border-color 0.3s; }
  .talk-card:hover { border-color:rgba(0,180,216,0.35); }
  .talk-icon { color:var(--teal); font-size:1.2rem; flex-shrink:0; margin-top:2px; }
  .talk-title { font-size:0.85rem; font-weight:600; margin-bottom:0.3rem; line-height:1.4; }
  .talk-venue { font-size:0.78rem; color:var(--text-muted); line-height:1.4; }
  .cert-badge { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:0.8rem 1.1rem; margin-bottom:0.6rem; display:flex; align-items:center; gap:0.8rem; transition:border-color 0.2s; }
  .cert-badge:hover { border-color:rgba(0,180,216,0.3); }
  .cert-icon { width:32px; height:32px; border-radius:50%; background:rgba(0,180,216,0.1); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
  .cert-name { font-size:0.83rem; color:var(--text-soft); }

  /* CV PAGE */
  .cv-section { margin-bottom:2.5rem; }
  .cv-section-header { font-family:'DM Mono',monospace; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.15em; color:var(--teal); border-bottom:1px solid var(--border); padding-bottom:0.5rem; margin-bottom:1rem; }
  .cv-download { display:inline-flex; align-items:center; gap:0.5rem; background:linear-gradient(135deg,var(--teal),var(--teal-light)); color:var(--navy); padding:0.75rem 1.5rem; border-radius:8px; font-weight:600; font-size:0.85rem; text-decoration:none; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:all 0.2s; margin-bottom:2rem; }
  .cv-download:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,180,216,0.3); }
  .cv-row { display:flex; gap:1rem; margin-bottom:0.8rem; align-items:flex-start; font-size:0.85rem; }
  .cv-label { color:var(--text-muted); min-width:120px; font-size:0.78rem; padding-top:1px; }
  .cv-value { color:var(--text-soft); flex:1; line-height:1.5; }

  .sub-section-label { font-size:0.8rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold); margin:2rem 0 1rem; font-weight:600; }

  /* Education stacked column layout */
  .edu-stack { display:flex; flex-direction:column; gap:0; margin-bottom:3rem; }
  .edu-card-stacked { display:flex; gap:2rem; padding:1.5rem 0; border-bottom:1px solid var(--border); align-items:flex-start; position:relative; }
  .edu-card-stacked:first-child { padding-top:0; }
  .edu-card-stacked:last-child { border-bottom:none; }
  .edu-stacked-left { min-width:130px; flex-shrink:0; }
  .edu-stacked-left .edu-period { font-size:0.75rem; color:var(--teal); font-family:'DM Mono',monospace; background:rgba(0,180,216,0.08); border:1px solid rgba(0,180,216,0.2); padding:0.25rem 0.55rem; border-radius:5px; display:inline-block; white-space:nowrap; }
  .edu-stacked-right { flex:1; }
  .edu-stacked-right .edu-degree { font-weight:600; font-size:0.97rem; margin-bottom:0.25rem; color:var(--text-main); }
  .edu-stacked-right .edu-school { color:var(--teal); font-size:0.85rem; margin-bottom:0.5rem; font-weight:500; }
  .edu-stacked-right .edu-detail { font-size:0.8rem; color:var(--text-soft); line-height:1.6; margin-bottom:0.2rem; }

  /* Full-width list for leadership/volunteering */
  .pro-full-list { max-width:700px; }

  /* Certifications horizontal row at bottom */
  .certs-row { display:flex; flex-wrap:wrap; gap:0.75rem; margin-top:0.25rem; }
  .certs-row .cert-badge { flex:1; min-width:220px; margin-bottom:0; }
  .affil-section { margin-top:2.5rem; margin-bottom:0.5rem; }
  .affil-chips { display:flex; flex-wrap:wrap; gap:0.75rem; margin-top:0.75rem; }
  .affil-chip { display:flex; align-items:center; gap:0.55rem; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:0.6rem 1rem; transition:border-color 0.2s; flex-shrink:0; }
  .affil-chip:hover { border-color:rgba(0,180,216,0.35); }
  .affil-chip-dot { width:7px; height:7px; border-radius:50%; background:var(--teal); flex-shrink:0; }
  .affil-chip-name { font-size:0.82rem; color:var(--text-soft); }
  .affil-chip-year { font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--text-muted); margin-left:0.3rem; white-space:nowrap; }

  /* Bio quote */
  .bio-quote {
    border-left: 3px solid var(--gold);
    margin: 1rem 0 1.5rem;
    padding: 0.75rem 1.2rem;
    background: rgba(244,167,50,0.06);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.7;
  }

  /* Lab links inside badge */
  .lab-links { display:flex; flex-direction:column; gap:0.35rem; margin-top:0.7rem; }
  .lab-link { font-size:0.72rem; color:var(--teal-light); text-decoration:none; display:inline-flex; align-items:center; gap:0.3rem; transition:color 0.2s; }
  .lab-link:hover { color:var(--gold); }

  /* Talks page */
  .talks-list { display:flex; flex-direction:column; gap:0.8rem; }
  .talk-card-full { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.4rem 1.8rem; display:flex; gap:1.5rem; align-items:flex-start; backdrop-filter:blur(10px); transition:border-color 0.3s,transform 0.3s; }
  .talk-card-full:hover { border-color:rgba(0,180,216,0.35); transform:translateX(4px); }

/* -- BUILD NAV -- */
function buildNav() {
  const tabs = [
    { id:"about",        label:"About Me" },
    { id:"experience",   label:"Work Experience" },
    { id:"publications", label:"Publications", hidden: !SETTINGS.showPublications },
    { id:"awards",       label:"Awards & Honours" },
    { id:"professional", label:"Professional Activities" },
    { id:"talks",        label:"Talks & Presentations" },
    { id:"cv",           label:"CV" }
  ];
  const nav = document.getElementById("nav-tabs");
  tabs.forEach((t,i) => {
    if (t.hidden) return;
    const li = document.createElement("li");
    li.className = "nav-tab" + (i===0?" active":"");
    li.textContent = t.label;
    li.onclick = () => showPage(t.id, li);
    nav.appendChild(li);
  });
}

function showPage(id, tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  const el = document.getElementById("page-"+id);
  if (el) el.classList.add("active");
  if (tab) tab.classList.add("active");
}

/* -- ABOUT PAGE -- */
function buildAbout() {
  const greetingLine = `<div class="intro-greeting">${PROFILE.greeting_en} &nbsp;·&nbsp; ${PROFILE.greeting_fr}</div>`;
  const bioHtml = PROFILE.bio.map(p => `<p class="intro-bio">${p}</p>`).join("");
  const quoteHtml = PROFILE.bio_quote ? `<blockquote class="bio-quote">${PROFILE.bio_quote}</blockquote>` : "";
  const tags = PROFILE.research_tags.map(t => `<span class="tag">${t}</span>`).join("");

  const socialHtml = SOCIAL_LINKS.map(s =>
    `<a class="social-btn" href="${s.url}" target="_blank">${SOCIAL_ICONS[s.icon]||""} ${s.label}</a>`
  ).join("");

  const photoHtml = PROFILE.photo
    ? `<img src="${PROFILE.photo}" alt="${PROFILE.name}">`
    : `<span class="photo-placeholder">👤</span>`;

  const eduHtml = EDUCATION.map(e => `
    <div class="edu-card-stacked">
      <div class="edu-stacked-left">
        <div class="edu-period">${e.period}</div>
      </div>
      <div class="edu-stacked-right">
        <div class="edu-degree">${e.degree}</div>
        <div class="edu-school">${e.school}</div>
        ${e.details.map(d=>`<div class="edu-detail">${d}</div>`).join("")}
        ${e.badge ? `<span class="badge-gold">${e.badge}</span>` : ""}
      </div>
    </div>`).join("");

  const newsHtml = NEWS.map(n => `
    <div class="news-item">
      <div class="news-dot ${n.gold?"gold":""}"></div>
      <div><div class="news-date">${n.date}</div><div class="news-text">${n.text}</div></div>
    </div>`).join("");

  document.getElementById("page-about").innerHTML = `
  <div class="container">
    <div class="about-hero">
      <div class="photo-col">
        <div class="photo-frame"><div class="photo-inner">${photoHtml}</div></div>
        <div class="lab-badge">
          <div class="lab-name">${PROFILE.lab}</div>
          <div class="lab-sub">${PROFILE.university}</div>
          <div class="lab-links">
            <a href="https://cerc-ngct.ca/" target="_blank" class="lab-link">CERC–NGCT Lab ↗</a>
            <a href="https://qc3.ca/" target="_blank" class="lab-link">QC3 Centre ↗</a>
          </div>
        </div>
        <div class="contact-card">
          <h4>Contact</h4>
          <div class="contact-item"><span class="contact-icon">✉</span><a href="mailto:${PROFILE.contact.email}">${PROFILE.contact.email}</a></div>
          <div class="contact-item"><span class="contact-icon">📍</span><span>${PROFILE.contact.location}</span></div>
        </div>
        <div class="social-links">
          <h4>Find Me Online</h4>
          <div class="social-grid">${socialHtml}</div>
        </div>
      </div>
      <div class="intro-col">
        ${greetingLine}
        <div class="intro-name">Hi, I'm Sasinda.</div>
        <div class="intro-title">${PROFILE.title}</div>
        ${bioHtml}
        ${quoteHtml}
        <div class="research-tags">${tags}</div>
      </div>
    </div>
    <h2 class="section-title">Education</h2>
    <div class="edu-stack">${eduHtml}</div>
    <h2 class="section-title">Recent News</h2>
    <div class="news-grid">${newsHtml}</div>
  </div>`;
}

/* -- EXPERIENCE PAGE -- */
function buildExperience() {
  const makeTimeline = (items, dotClass) => items.map(e => `
    <div class="timeline-item">
      <div class="timeline-dot ${dotClass}"></div>
      <div class="timeline-card">
        <div class="timeline-header">
          <div class="timeline-role">${e.role}</div>
          <div class="timeline-period">${e.period}</div>
        </div>
        <div class="timeline-org">${e.org}</div>
        <div class="timeline-body"><ul>${e.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>
      </div>
    </div>`).join("");

  document.getElementById("page-experience").innerHTML = `
  <div class="container">
    <h2 class="section-title" style="margin-bottom:2.5rem;">Work Experience</h2>
    <p class="sub-section-label">Academic & Research</p>
    <div class="timeline">${makeTimeline(EXPERIENCE.academic,"gold")}</div>
    <p class="sub-section-label">Industry & Internships</p>
    <div class="timeline">${makeTimeline(EXPERIENCE.industry,"")}</div>
  </div>`;
}

/* -- PUBLICATIONS PAGE -- */
function buildPublications() {
  const totalJ = PUBLICATIONS.journals.length;
  const totalC = PUBLICATIONS.conferences.length;
  const totalP = PUBLICATIONS.patents.length;

  const makeCard = (p, type) => {
    const statusMap = {
      submitted: `<span class="pub-status status-submitted">Submitted</span>`,
      accepted:  `<span class="pub-status status-accepted">Accepted</span>`,
      best:      `<span class="pub-status status-best">🏆 Best Paper Award</span>`,
      "": ""
    };
    return `<div class="pub-card" data-type="${type}">
      <div class="pub-number">${p.num}</div>
      <div class="pub-title">${p.title}</div>
      <div class="pub-authors">${p.authors}</div>
      <div class="pub-venue">${p.venue}${statusMap[p.status]||""}</div>
    </div>`;
  };

  const journalCards    = PUBLICATIONS.journals.map(p=>makeCard(p,"journal")).join("");
  const conferenceCards = PUBLICATIONS.conferences.map(p=>makeCard(p,"conference")).join("");
  const patentCards     = PUBLICATIONS.patents.map(p=>makeCard(p,"patent")).join("");

  document.getElementById("page-publications").innerHTML = `
  <div class="container">
    <h2 class="section-title" style="margin-bottom:2rem;">Publications</h2>

    <div class="pub-section-header journal">
      <span class="pub-section-icon">📰</span>
      <span>Journal Articles <span style="font-family:'DM Mono',monospace;font-size:0.95em;opacity:0.85;">(${totalJ})</span></span>
      <span class="pub-section-count">${totalJ} papers</span>
    </div>
    <div class="pub-list" style="margin-bottom:2.5rem;">${journalCards}</div>

    <div class="pub-section-header conference">
      <span class="pub-section-icon">🎤</span>
      <span>Conference Papers <span style="font-family:'DM Mono',monospace;font-size:0.95em;opacity:0.85;">(${totalC})</span></span>
      <span class="pub-section-count">${totalC} papers</span>
    </div>
    <div class="pub-list" style="margin-bottom:2.5rem;">${conferenceCards}</div>

    <div class="pub-section-header patent">
      <span class="pub-section-icon">📋</span>
      <span>Patents <span style="font-family:'DM Mono',monospace;font-size:0.95em;opacity:0.85;">(${totalP})</span></span>
      <span class="pub-section-count">${totalP} patents</span>
    </div>
    <div class="pub-list">${patentCards}</div>
  </div>`;
}

/* -- AWARDS PAGE -- */
function buildAwards() {
  const cards = AWARDS.map(a => `
    <div class="award-card">
      <div class="award-year">${a.year}</div>
      <div class="award-icon">${a.icon}</div>
      <div class="award-title">${a.title}</div>
      <div class="award-org">${a.org}</div>
      <div class="award-desc">${a.desc}</div>
    </div>`).join("");

  document.getElementById("page-awards").innerHTML = `
  <div class="container">
    <h2 class="section-title" style="margin-bottom:2rem;">Awards & Honours</h2>
    <div class="awards-grid">${cards}</div>
  </div>`;
}

    <div class="cert-badge">
      <div class="cert-icon">${c.icon}</div>
      <div class="cert-name">${c.name}</div>

  document.getElementById("page-professional").innerHTML = `
  <div class="container">
    <h2 class="section-title" style="margin-bottom:2rem;">Professional Activities</h2>

    <div class="pro-grid">
      <div>
        <div class="pro-section-title">Reviewer — Journals</div>
        ${makeList(PROFESSIONAL.journal_reviewer)}
      </div>
      <div>
        <div class="pro-section-title">Reviewer — Conferences & Workshops</div>
        ${makeList(PROFESSIONAL.conf_reviewer)}
      </div>
    </div>

    <div class="affil-section">
      <div class="pro-section-title">Professional Affiliations</div>
      <div class="affil-chips">
        ${PROFESSIONAL.affiliations.map(a => `
          <div class="affil-chip">
            <span class="affil-chip-dot"></span>
            <span class="affil-chip-name">${a.name}</span>
            <span class="affil-chip-year">${a.year}</span>
          </div>`).join("")}
      </div>
    </div>

    <p class="sub-section-label">Volunteering</p>
    <div class="pro-full-list">${makeList(PROFESSIONAL.volunteering)}</div>

    <p class="sub-section-label">Leadership & Service</p>
    <div class="pro-full-list">${makeList(PROFESSIONAL.leadership)}</div>

    <p class="sub-section-label">Certifications & Licenses</p>
    <div class="certs-row">${certs}</div>

}

/* -- TALKS PAGE -- */
function buildTalks() {
  const talks = PROFESSIONAL.talks.map((t,i) => `
    <div class="talk-card-full">
      <div class="talk-num">${String(PROFESSIONAL.talks.length - i).padStart(2,'0')}</div>
      <div class="talk-main">
        <div class="talk-title-full">${t.title}</div>
        <div class="talk-venue-full">${t.venue}</div>
      </div>
    </div>`).join("");

  document.getElementById("page-talks").innerHTML = `
  <div class="container">
    <h2 class="section-title" style="margin-bottom:0.5rem;">Talks &amp; Presentations</h2>

/* -- CV PAGE -- */
function buildCV() {
  const refCards = PROFESSIONAL.references.map(r => `
    <div class="ref-card">
      <div class="ref-note">${r.note}</div>
      <div class="ref-name">${r.name}</div>
      <div class="ref-role">${r.role}</div>
      <div class="ref-org">${r.org}</div>
      <a href="mailto:${r.email}" class="ref-email">✉ ${r.email}</a>
    </div>`).join("");

  document.getElementById("page-cv").innerHTML = `
  <div class="container">
    <h2 class="section-title" style="margin-bottom:1.5rem;">Curriculum Vitae</h2>
    <a class="cv-download" href="#" onclick="alert('Please link your CV PDF here. Edit PROFILE.cvUrl in the data section.')">↓ Download Full CV</a>

    <div class="cv-section">
      <div class="cv-section-header">Personal Information</div>
      <div class="cv-row"><div class="cv-label">Full Name</div><div class="cv-value">${PROFILE.name}</div></div>
      <div class="cv-row"><div class="cv-label">Email</div><div class="cv-value"><a href="mailto:${PROFILE.contact.email}" style="color:var(--teal-light);">${PROFILE.contact.email}</a></div></div>
      <div class="cv-row"><div class="cv-label">Location</div><div class="cv-value">${PROFILE.contact.location}</div></div>
      <div class="cv-row"><div class="cv-label">Lab</div><div class="cv-value">${PROFILE.lab}, ${PROFILE.university}</div></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-header">Research Interests</div>
      <div class="cv-value" style="line-height:1.8;">${PROFILE.research_tags.join(" · ")}</div>
    </div>

    <div class="cv-section">
      <div class="cv-section-header">Education</div>
      ${EDUCATION.map(e=>`<div class="cv-row"><div class="cv-label">${e.period}</div><div class="cv-value"><strong>${e.degree}</strong> · ${e.school}${e.badge?` · <em>${e.badge}</em>`:""}</div></div>`).join("")}
    </div>

    <div class="cv-section">
      <div class="cv-section-header">References</div>
      <div class="ref-grid">${refCards}</div>
    </div>
  </div>`;
}

/* -- INIT -- */
document.addEventListener('DOMContentLoaded', function() {
  try {
    buildNav();
    buildAbout();
    buildExperience();
    buildPublications();
    buildAwards();
    buildProfessional();
    buildTalks();
    buildCV();
  } catch(e) {
    document.body.innerHTML += '<div style="color:red;padding:2rem;font-family:monospace;">JS Error: ' + e.message + '<br>' + e.stack + '</div>';
  }
});
</script>
